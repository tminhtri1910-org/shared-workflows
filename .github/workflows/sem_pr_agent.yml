# Name of the GitHub Action workflow
name: PR Impact Analysis (sem + pr-agent)

# Trigger the workflow on pull requests targeting the 'main' branch
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_call:
    secrets:
      OPENAI_KEY:
        required: true

permissions:
  pull-requests: write
  contents: write

jobs:
  impact-analysis:
    if: ${{ github.event.sender.type != 'Bot' }}
    # Run the job on the latest Ubuntu runner
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository code
      - uses: actions/checkout@v4
        with:
          # Fetch all history for all tags and branches (needed for accurate diffing)
          fetch-depth: 0

      # Step 2: Download and install the 'sem' CLI tool from Ataraxy-Labs
      - name: Install sem
        run: |
          curl -L https://github.com/Ataraxy-Labs/sem/releases/latest/download/sem-linux-x86_64.tar.gz -o sem.tar.gz  
          tar -xzf sem.tar.gz  
          chmod +x sem  
          # Move the executable to a directory in the system's PATH
          sudo mv sem /usr/local/bin/

      # Step 3: Run 'sem diff' to compute a semantic diff between the target branch and the PR
      - name: Get semantic diff
        id: diff
        run: |
          # Compare origin/main with the current HEAD and output results to diff.json
          sem diff --from origin/${{ github.base_ref }} --to HEAD --format json | jq '.' > diff.json

          # Expose the JSON output as a step output variable for potential downstream use
          # echo "diff_output<<EOF" >> $GITHUB_OUTPUT
          cat diff.json
          # echo "EOF" >> $GITHUB_OUTPUT

      # Step 4: Extract dependents data (JSON)
      - name: Extract dependents data
        id: dependents
        env:
          OUTPUT_FILE: dependents-data-${{ github.event.repository.name }}.json
        run: |
          echo "[" > "$OUTPUT_FILE"
          first=true
          
          jq -r '.changes[] | [.entityName, .filePath, .entityType] | @tsv' diff.json | while IFS=$'\t' read -r entity_name file_path entity_type; do  
              
            if sem context "$entity_name" --file "$file_path" --json > context.json; then  
              jq '[.entries[] | select(.role == "direct_dependent")]' context.json > direct.json

              if jq -e '. | length > 0' direct.json > /dev/null; then 
                echo "[]" > all_transitive.json
                
                jq -r '.[] | [.name, .file] | @tsv' direct.json | while IFS=$'\t' read -r dep_name dep_file; do  
                  if sem context "$dep_name" --file "$dep_file" --json > transitive_context.json; then  
                    jq --arg parent "$dep_name" '[.entries[] | select(.role == "direct_dependent") | . + {"parent": $parent}]' transitive_context.json > current_transitive.json

                    if jq -e '. | length > 0' current_transitive.json > /dev/null; then  
                      jq -s '.[0] + .[1]' all_transitive.json current_transitive.json > temp.json && mv temp.json all_transitive.json
                    fi
                  fi
                done
                
                if [ "$first" = true ]; then  
                  first=false  
                else  
                  echo "," >> "$OUTPUT_FILE"  
                fi  
                jq -n --arg name "$entity_name" --arg path "$file_path" --arg type "$entity_type" \
                  --slurpfile direct direct.json \
                  --slurpfile transitive all_transitive.json \
                  '{entityName: $name, entityType: $type, filePath: $path, direct_dependents: $direct[0], transitive_dependents: $transitive[0]}' >> "$OUTPUT_FILE"
              fi

            else  
              echo "Failed to get context for $entity_name in $file_path" >&2  
              cat context.json >&2  
            fi

          done
          
          echo "]" >> "$OUTPUT_FILE"

      - name: Upload Dependents Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependents-data-${{ github.event.repository.name }}
          path: dependents-data-${{ github.event.repository.name }}.json
          retention-days: 14
          
      - name: PR Agent action step
        id: pragent
        uses: tminhtri1910/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Map the file path to an environment variable for pr-agent to read
          DEPENDENTS_DATA_FILE: dependents-data-${{ github.event.repository.name }}.json
              
      # Step 5: Post the generated impact report as a comment on the pull request
      - name: Comment PR with impact report
        uses: actions/github-script@v7
        env:
          DEPENDENTS_DATA_FILE: dependents-data-${{ github.event.repository.name }}.json
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.env.DEPENDENTS_DATA_FILE, 'utf8'));  
            let comment = "# Dependents with Code Content (sem)\n\n";  
            
            data.forEach(entity => {
              comment += `## Changed entity: ${entity.entityType} \`${entity.entityName}\` (${entity.filePath})\n\n`;
              entity.direct_dependents.forEach(dep => {
                comment += `### ${dep.name} (${dep.type})\n`;
                comment += `File: ${dep.file}\n`;
                comment += `Role: ${dep.role}\n`;
                comment += '```\n';
                comment += `${dep.content}\n`;
                comment += '```\n\n';
              });

              entity.transitive_dependents.forEach(dep => {
                comment += `### ${dep.name} (${dep.type})\n`;
                comment += `File: ${dep.file}\n`;
                comment += `Role: transitive_dependent\n`;
                comment += `Parent: ${dep.parent}\n`;
                comment += '```\n';
                comment += `${dep.content}\n`;
                comment += '```\n\n';
              });
            });

            // Truncate comment if it exceeds GitHub's 65536 character limit
            const MAX_LENGTH = 65000;
            if (comment.length > MAX_LENGTH) {
              const remaining = comment.length - MAX_LENGTH;
              comment = comment.substring(0, MAX_LENGTH) + `\n\n> [!WARNING]\n> **The impact report was truncated because it exceeded GitHub's 65,536 character limit.**\n> There are ${remaining} more characters not displayed. Please download the \`dependents-data\` artifact from the Actions tab to view the full JSON data.`;
            }

            // Use the GitHub REST API to create a comment on the current PR
            github.rest.issues.createComment({  
              issue_number: context.issue.number,  
              owner: context.repo.owner,  
              repo: context.repo.repo,  
              body: comment
            })

